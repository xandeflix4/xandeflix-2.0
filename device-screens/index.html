<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Comparativo de telas - Xandeflix</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #111;
        color: #f5f5f5;
        font-family: Arial, sans-serif;
      }

      main {
        width: min(1800px, 100%);
        margin: 0 auto;
        padding: 24px;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 24px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
      }

      figure {
        margin: 0;
        border: 1px solid #333;
        background: #050505;
      }

      figcaption {
        padding: 12px 14px;
        border-bottom: 1px solid #333;
        font-weight: 700;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Comparativo de telas - Xandeflix</h1>
      <div class="grid">
        <figure>
          <figcaption>Firestick - 1920x1080</figcaption>
          <img src="firestick.png" alt="Print do Firestick" />
        </figure>
        <figure>
          <figcaption>Tablet - 2560x1600</figcaption>
          <img src="tablet.png" alt="Print do tablet" />
        </figure>
      </div>
    </main>
  </body>
</html>
